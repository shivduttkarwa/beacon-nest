<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">BeaconNest logo</title>
  <desc id="desc">A polished teal beacon pin with a warm light nested inside.</desc>
  <defs>
    <linearGradient id="mark" x1="14" y1="8" x2="50" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18B69F"/>
      <stop offset="0.48" stop-color="#0F7B6C"/>
      <stop offset="1" stop-color="#063E3A"/>
    </linearGradient>
    <radialGradient id="light" cx="0" cy="0" r="1" gradientTransform="matrix(0 18 -18 0 32 25)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9CC"/>
      <stop offset="0.34" stop-color="#F8D75E" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F8D75E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="24" y1="18" x2="43" y2="48" gradientUnits="userSpaceOnUse">
